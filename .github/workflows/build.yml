name: Build Native Addon

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-native:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build native addon
        run: npx node-gyp rebuild --directory src/native

      - name: Upload .node artifact
        uses: actions/upload-artifact@v4
        with:
          name: hotkey-hook-node
          path: src/native/build/Release/hotkey_hook.node
